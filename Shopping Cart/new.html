<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 3004px;
            background-color: #f5f5f5;
        }
        h2{
            font-size: 40px;
        }

        .cart-container {
            width: 1440px;
            height: 3004px;
            background-color: white;
            padding: 40px;
   
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .cart-table th {
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .cart-table th {
            background-color: #ffa500;
            font-weight: normal; /* Loại bỏ chữ in đậm */
        }

        .cart-summary {
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .total-product, .quantity {
            display: flex; 
        }
        #total-price{
            margin-left: 984px;
            margin-right: 155px;

        }
        #total-quantity{
            margin-left: 1095px;
            margin-right: 163px;

        }

   

        button {
            padding: 15px;
            border: none;
            border-radius: 5px;
            background-color: #ffa500;
            font-size: 24px;
        }

        .continue-button {
            width: 100%;
        }

        .clear-cart {
            font-size: 24px;
        }

        .cart-table img {
            width: 100px;
        }
    </style>
</head>
<body>
    <div class="cart-container">
        <div class="cart-header">
            <button class="go-home"><i class="fas fa-angle-left return"></i></button>
            <h2>My cart</h2>
            <button class="clear-cart"><i class="far fa-trash-alt delete_1"></i></button>
        </div>

        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- Dynamic items will be added here -->
            </tbody>
        </table>
        <div class="cart-summary">
            <div class="total-product">
                <p>Total product price:</p>
                <span id="total-price">$0</span>
            </div>
            <div class="quantity">
                <p>Quantity:</p>
                <span id="total-quantity">0</span>
            </div>
        </div>
        
        <button class="continue-button">Continue</button>
    </div>
   
   
    
</body>
</html>
