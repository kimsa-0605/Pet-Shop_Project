<body>
    <div class="cart-container">
        <div class="cart-header">  
            <button id="go-home"><i class='fas fa-angle-left return'></i></button>
            <p class="title">My cart</p>
            <button id="delete"><i class='far fa-trash-alt delete_1'></i></button>
        </div>
        <p class="border-p"></p>
           
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Products</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- Items sẽ được thêm động vào đây -->
            </tbody>
        </table>

        <div class="cart-summary">
            <p>Total product price: <span id="total-price">$0</span></p>
            <p>Quantity: <span id="total-quantity">0</span></p>
        </div>
        <button class="continue-button">Continues</button>
    </div>
    <script>
        const cartTable = document.getElementById('cart-items');
        const totalPriceEl = document.getElementById('total-price');
        const totalQuantityEl = document.getElementById('total-quantity');
    
        // Hiển thị các sản phẩm
        function renderCart() {
            cartTable.innerHTML = '';
            let totalQuantity = 0;
            let totalPrice = 0;
    
            cartItems.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="${item.img}" alt="product image" width="50px"> ${item.name}</td>
                    <td>$${item.price.toFixed(2)}</td>
                    <td>
                        <button class="quantity-btn" data-id="${item.id}" data-action="decrease">-</button>
                        ${item.quantity}
                        <button class="quantity-btn" data-id="${item.id}" data-action="increase">+</button>
                    </td>
                    <td>$${(item.price * item.quantity).toFixed(2)}</td>
                    <td><button class="remove-btn" data-id="${item.id}"><i class="far fa-trash-alt" ></i></button></td>
                `;
    
                cartTable.appendChild(row);
    
                totalQuantity += item.quantity;
                totalPrice += item.price * item.quantity;
            });
    
        }
    </script>
  

    
</body>
